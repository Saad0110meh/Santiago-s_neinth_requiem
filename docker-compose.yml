version: '3.8'

networks:
  cafeteria-net:
    driver: bridge

volumes:
  pg_data:
  redis_data:

services:
  # ─── INFRASTRUCTURE ─────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: cafeteria-postgres
    environment:
      POSTGRES_USER: cafuser
      POSTGRES_PASSWORD: cafpass
      POSTGRES_DB: cafeteria
    volumes:
      - pg_data:/var/lib/postgresql/data
      # Make sure ./infra/init.sql exists! Or comment this out for now.
      - ./infra/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks: 
      - cafeteria-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cafuser -d cafeteria"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: cafeteria-redis
    volumes:
      - redis_data:/data
    networks: 
      - cafeteria-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ─── MICROSERVICES ──────────────────────────────────────────────────────────
 # ─── MICROSERVICES ──────────────────────────────────────────────────────────
  identity-provider:
    build: ./services/identity-provider
    container_name: cafeteria-identity
    ports:
      - "3001:3001"
    environment:
      - DATABASE_URL=postgresql://cafuser:cafpass@postgres:5432/cafeteria
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=devsprint-super-secret-2026
      - PORT=3001
      - RATE_LIMIT_WINDOW=60
      - RATE_LIMIT_MAX=3
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
    networks:
      - cafeteria-net
    restart: unless-stopped

  order-gateway:
    build: ./services/order-gateway
    container_name: cafeteria-gateway
    ports:
      - "3000:3000"
    environment:
      - JWT_SECRET=devsprint-super-secret-2026
      - REDIS_URL=redis://redis:6379
      - STOCK_SERVICE_URL=http://stock-service:3002
      - KITCHEN_URL=http://kitchen-queue:3003
      - PORT=3000
    depends_on:
      redis:             { condition: service_healthy }
      identity-provider: { condition: service_started }
      stock-service:     { condition: service_started }
    networks: 
      - cafeteria-net
    restart: unless-stopped

  stock-service:
    build: ./services/stock-service
    container_name: cafeteria-stock
    ports:
      - "3002:3002"
    environment:
      - DATABASE_URL=postgresql://cafuser:cafpass@postgres:5432/cafeteria
      - REDIS_URL=redis://redis:6379
      - PORT=3002
    depends_on:
      postgres: { condition: service_healthy }
    networks:
      - cafeteria-net
    restart: unless-stopped

  kitchen-queue:
    build: ./services/kitchen-queue
    container_name: cafeteria-kitchen
    ports:
      - "3003:3003"
    environment:
      - REDIS_URL=redis://redis:6379
      - NOTIFICATION_URL=http://notification-hub:3004
      - STOCK_SERVICE_URL=http://stock-service:3002
      - JWT_SECRET=devsprint-super-secret-2026
      - PORT=3003
    depends_on:
      redis: { condition: service_healthy }
    networks: 
      - cafeteria-net
    restart: unless-stopped

  notification-hub:
    build: ./services/notification-hub
    container_name: cafeteria-notifications
    ports:
      - "3004:3004"
    environment:
      - REDIS_URL=redis://redis:6379
      - PORT=3004
    depends_on:
      redis: { condition: service_healthy }
    networks: 
      - cafeteria-net
    restart: unless-stopped

  # ─── FRONTEND ───────────────────────────────────────────────────────────────
  frontend:
    build: ./frontend
    container_name: cafeteria-frontend
    ports:
      - "8080:80"  # You will access the UI at http://localhost:8080
    networks:
      - cafeteria-net
    restart: always