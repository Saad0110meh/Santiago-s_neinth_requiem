<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IUT Cafeteria - Fasting Engineer UI</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #10b981;
            --primary-dark: #059669;
            --bg: #f3f4f6;
            --card-bg: rgba(255, 255, 255, 0.9);
            --text: #1f2937;
            --text-light: #6b7280;
        }

        body { 
            font-family: 'Poppins', sans-serif; 
            background: linear-gradient(135deg, #e0eafc 0%, #cfdef3 100%);
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
            color: var(--text);
        }

        .container { 
            background: var(--card-bg); 
            backdrop-filter: blur(10px);
            padding: 40px; 
            border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); 
            width: 100%;
            max-width: 420px; 
            text-align: center;
            border: 1px solid rgba(255,255,255,0.5);
            transition: all 0.3s ease;
        }

        h2 { margin-top: 0; color: #111827; font-weight: 700; letter-spacing: -0.5px;}
        p { color: var(--text-light); font-size: 14px; margin-bottom: 25px; }

        input { 
            width: 100%; 
            padding: 14px; 
            margin: 10px 0 20px 0; 
            border-radius: 10px; 
            border: 1px solid #d1d5db; 
            box-sizing: border-box; 
            font-family: 'Poppins', sans-serif;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.2); }

        button { 
            width: 100%; 
            padding: 14px; 
            border-radius: 10px; 
            border: none; 
            background-color: var(--primary); 
            color: white; 
            font-family: 'Poppins', sans-serif;
            font-size: 16px; 
            font-weight: 600; 
            cursor: pointer; 
            transition: all 0.3s;
            box-shadow: 0 4px 6px rgba(16, 185, 129, 0.2);
        }

        button:hover:not(:disabled) { background-color: var(--primary-dark); transform: translateY(-1px); }
        button:disabled { background-color: #9ca3af; cursor: not-allowed; box-shadow: none; transform: none; }

        .hidden { display: none !important; }

        /* Menu Item Card */
        .menu-card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            border: 1px solid #f3f4f6;
            text-align: left;
        }
        .menu-card h3 { margin: 0 0 5px 0; color: #1f2937; }
        .menu-card p { margin: 0 0 15px 0; font-size: 13px; color: #ef4444; font-weight: 600; }

        /* Modern Status Tracker */
        .tracker-container {
            margin-top: 30px;
            padding: 20px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            text-align: left;
        }

        .status-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            border-bottom: 1px solid #eee;
            padding-bottom: 10px;
        }

        .status-header h4 { margin: 0; font-size: 16px; }
        .pulse-badge {
            background: #f59e0b;
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            animation: pulse 2s infinite;
        }

        .log-box {
            background: #1f2937;
            color: #10b981;
            font-family: 'Courier New', Courier, monospace;
            font-size: 12px;
            padding: 15px;
            border-radius: 8px;
            height: 120px;
            overflow-y: auto;
            margin-top: 15px;
        }
        .log-entry { margin-bottom: 5px; border-bottom: 1px solid #374151; padding-bottom: 3px; }
        .log-time { color: white ; margin-right: 8px; }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(245, 158, 11, 0.4); }
            70% { box-shadow: 0 0 0 6px rgba(245, 158, 11, 0); }
            100% { box-shadow: 0 0 0 0 rgba(245, 158, 11, 0); }
        }

        /* Dynamic classes applied via JS */
        .bg-kitchen { background-color: #3b82f6 !important; }
        .bg-ready { background-color: #10b981 !important; animation: none !important; }
    </style>
</head>
<body>

<div class="container">
    <h2>IUT Cafeteria 🌙</h2>
    
    <div id="login-section">
        <p>Authenticate to access the Ramadan portal.</p>
        <input type="text" id="student_id" placeholder="Student ID (e.g., 210041100)" autocomplete="off">
        <button onclick="login()">Authenticate</button>
        <div id="login-error" style="color: #ef4444; font-size: 13px; margin-top: 10px; font-weight: 600;"></div>
    </div>

    <div id="order-section" class="hidden">
        <p>Logged in as: <strong id="user-display" style="color: var(--primary);"></strong></p>
        
        <div class="menu-card">
            <h3>Beef Tehari</h3>
            <p>🌶️ Ramadan Special</p>
            <button id="order-btn" onclick="placeOrder()">Place Order</button>
        </div>
    </div>

    <div id="status-section" class="tracker-container hidden">
        <div class="status-header">
            <h4>Live Order Status</h4>
            <span id="status-badge" class="pulse-badge">Pending</span>
        </div>
        <div style="font-size: 13px; color: var(--text-light);" id="status-message">Initializing secure connection...</div>
        
        <div class="log-box" id="tracker-logs">
            </div>
    </div>
</div>

<script>
    let currentToken = '';
    let currentStudentId = '';
    const socket = io('http://localhost:3004');

    socket.on('connect', () => {
        console.log('Connected to WebSocket server');
    });

    socket.on('order_update', (data) => {
        if (data.student_id === currentStudentId) {
            updateTracker(data.status, data.message);
        }
    });

    async function login() {
        const studentId = document.getElementById('student_id').value;
        const errorDiv = document.getElementById('login-error');
        const btn = document.querySelector('#login-section button');
        
        errorDiv.innerText = '';
        btn.innerText = 'Verifying...';
        btn.disabled = true;

        try {
            const response = await fetch('http://localhost:3001/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ student_id: studentId })
            });

            if (!response.ok) throw new Error('Invalid ID or Rate Limit Exceeded (3/min)');
            
            const data = await response.json();
            currentToken = data.access_token;
            currentStudentId = studentId;

            document.getElementById('login-section').classList.add('hidden');
            document.getElementById('order-section').classList.remove('hidden');
            document.getElementById('user-display').innerText = studentId;

        } catch (err) {
            errorDiv.innerText = err.message;
            btn.innerText = 'Authenticate';
            btn.disabled = false;
        }
    }

    async function placeOrder() {
        const orderBtn = document.getElementById('order-btn');
        orderBtn.disabled = true;
        orderBtn.innerText = "Order Processing...";

        document.getElementById('status-section').classList.remove('hidden');
        updateTracker('Pending', 'Sending request to gateway...');

        try {
            const response = await fetch('http://localhost:3000/api/order', {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${currentToken}`
                },
                body: JSON.stringify({ item_id: 1, quantity: 1 })
            });

            if (!response.ok) {
                const errorData = await response.json();
                updateTracker('Failed', errorData.detail || 'Order rejected by server');
                orderBtn.innerText = "Order Failed";
                return;
            }

            orderBtn.innerText = "Order Confirmed";
            updateTracker('Stock Verified', 'Order securely routed to kitchen queue.');

        } catch (err) {
            updateTracker('Error', 'Gateway connection failed.');
            orderBtn.innerText = "Network Error";
        }
    }

    function updateTracker(status, message) {
        const badge = document.getElementById('status-badge');
        const msgDiv = document.getElementById('status-message');
        const logsDiv = document.getElementById('tracker-logs');

        badge.innerText = status;
        msgDiv.innerText = message;

        if (status === 'In Kitchen') {
            badge.className = 'pulse-badge bg-kitchen';
        } else if (status === 'Ready' || status === 'Failed') {
            badge.className = 'pulse-badge bg-ready';
            if (status === 'Failed') badge.style.backgroundColor = '#ef4444';
        }

        const time = new Date().toLocaleTimeString('en-US', { hour12: false, hour: "numeric", minute: "numeric", second: "numeric" });
        logsDiv.innerHTML += `<div class="log-entry"><span class="log-time">[${time}]</span> > ${status.toUpperCase()}</div>`;
        logsDiv.scrollTop = logsDiv.scrollHeight; // Auto-scroll terminal
    }
</script>

</body>
</html>
