<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IUT Cafeteria - Fasting Engineer UI</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 400px; text-align: center; }
        h2 { color: #2c3e50; }
        input, button { width: 100%; padding: 10px; margin: 10px 0; border-radius: 5px; border: 1px solid #ccc; box-sizing: border-box; }
        button { background-color: #27ae60; color: white; border: none; cursor: pointer; font-weight: bold; }
        button:hover { background-color: #219150; }
        .hidden { display: none; }
        .status-box { margin-top: 20px; padding: 15px; border-radius: 5px; background-color: #e8f8f5; border: 1px solid #a3e4d7; text-align: left; }
        .badge { display: inline-block; padding: 5px 10px; border-radius: 15px; font-size: 12px; font-weight: bold; margin-bottom: 10px; }
        .badge.pending { background: #f39c12; color: white; }
        .badge.kitchen { background: #3498db; color: white; }
        .badge.ready { background: #2ecc71; color: white; }
        .log { font-family: monospace; font-size: 12px; color: #555; margin-top: 5px; }
    </style>
</head>
<body>

<div class="container">
    <h2>IUT Cafeteria</h2>
    
    <div id="login-section">
        <p>Login to secure your Iftar.</p>
        <input type="text" id="student_id" placeholder="Enter Student ID (e.g., 210041100)">
        <button onclick="login()">Login</button>
        <div id="login-error" style="color: red; font-size: 14px;"></div>
    </div>

    <div id="order-section" class="hidden">
        <p>Welcome, <strong id="user-display"></strong>!</p>
        <div style="border: 1px solid #eee; padding: 15px; margin-bottom: 15px; border-radius: 8px;">
            <h3>Beef Tehari</h3>
            <p>Ramadan Special</p>
            <button onclick="placeOrder()">Order Now</button>
        </div>
    </div>

    <div id="status-section" class="status-box hidden">
        <div id="status-badge" class="badge pending">Pending</div>
        <div id="status-message">Awaiting action...</div>
        <hr style="border: 0; border-top: 1px solid #eee; margin: 10px 0;">
        <div id="tracker-logs"></div>
    </div>
</div>

<script>
    let currentToken = '';
    let currentStudentId = '';

    // Connect to the Notification Hub via WebSockets!
    const socket = io('http://localhost:3004');

    socket.on('connect', () => {
        console.log('Connected to WebSocket server');
    });

    // Listen for real-time updates from the Notification Hub
    socket.on('order_update', (data) => {
        // Only react to updates for THIS student
        if (data.student_id === currentStudentId) {
            updateTracker(data.status, data.message);
        }
    });

    async function login() {
        const studentId = document.getElementById('student_id').value;
        const errorDiv = document.getElementById('login-error');
        errorDiv.innerText = '';

        try {
            const response = await fetch('http://localhost:3001/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ student_id: studentId })
            });

            if (!response.ok) throw new Error('Invalid ID or Rate Limit Exceeded');
            
            const data = await response.json();
            currentToken = data.access_token;
            currentStudentId = studentId;

            document.getElementById('login-section').classList.add('hidden');
            document.getElementById('order-section').classList.remove('hidden');
            document.getElementById('user-display').innerText = studentId;

        } catch (err) {
            errorDiv.innerText = err.message;
        }
    }

    async function placeOrder() {
        const orderBtn = document.querySelector('button[onclick="placeOrder()"]');
        orderBtn.disabled = true;
        orderBtn.innerText = "Order Placed";
        orderBtn.style.backgroundColor = "#95a5a6";
        document.getElementById('status-section').classList.remove('hidden');
        updateTracker('Pending', 'Sending request to gateway...', 'pending');

        try {
            const response = await fetch('http://localhost:3000/api/order', {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${currentToken}`
                },
                body: JSON.stringify({ item_id: 1, quantity: 1 })
            });

            if (!response.ok) {
                const errorData = await response.json();
                updateTracker('Failed', errorData.detail || 'Order rejected', 'pending');
                return;
            }

            // If it succeeds, the Gateway already verified stock
            updateTracker('Stock Verified', 'Order routed to kitchen queue.', 'pending');

        } catch (err) {
            updateTracker('Error', 'Could not connect to Gateway.', 'pending');
        }
    }

    function updateTracker(status, message) {
        const badge = document.getElementById('status-badge');
        const msgDiv = document.getElementById('status-message');
        const logsDiv = document.getElementById('tracker-logs');

        badge.innerText = status;
        msgDiv.innerText = message;

        // Change colors based on status
        if (status === 'In Kitchen') badge.className = 'badge kitchen';
        if (status === 'Ready') badge.className = 'badge ready';

        // Add a timestamped log
        const time = new Date().toLocaleTimeString();
        logsDiv.innerHTML += `<div class="log">[${time}] ${status}</div>`;
    }
</script>

</body>
</html>
