<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevSprint 2026 - Admin Command Center</title>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #0f172a;
            color: #f8fafc;
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 30px;
            display: flex;
            height: 100vh;
            box-sizing: border-box;
            gap: 30px;
        }
        
        /* Sidebar Styles */
        .sidebar {
            width: 280px;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .sidebar-header {
            font-size: 20px;
            font-weight: 700;
            padding-bottom: 15px;
            border-bottom: 2px solid #334155;
            margin-bottom: 10px;
        }

        .service-item {
            background-color: #1e293b;
            border: 1px solid #334155;
            border-radius: 10px;
            padding: 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            transition: all 0.2s;
        }

        .service-item:hover, .service-item.active {
            border-color: #3b82f6;
            background-color: #25354d;
        }

        .service-name {
            font-weight: 600;
        }

        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background-color: #64748b; /* Grey by default */
            box-shadow: 0 0 5px rgba(0,0,0,0.5);
        }

        .status-up { background-color: #10b981; box-shadow: 0 0 8px #10b981; }
        .status-down { background-color: #ef4444; box-shadow: 0 0 8px #ef4444; animation: blink 1s infinite; }

        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

        /* Main Content Styles */
        .main-content {
            flex-grow: 1;
            background-color: #1e293b;
            border-radius: 15px;
            border: 1px solid #334155;
            padding: 30px;
            display: flex;
            flex-direction: column;
        }

        .metrics-header {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 20px;
            color: #3b82f6;
        }

        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .metric-box {
            background-color: #0f172a;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #334155;
            text-align: center;
        }

        .metric-value {
            font-family: 'Fira Code', monospace;
            font-size: 24px;
            font-weight: 700;
            color: #f8fafc;
            margin-bottom: 5px;
        }

        .metric-label {
            font-size: 12px;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        canvas {
            background-color: #0f172a;
            border-radius: 8px;
            border: 1px solid #334155;
            width: 100%;
            height: 250px;
        }

        .chaos-btn {
            background-color: #ef4444;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            margin-top: auto;
            align-self: flex-start;
            transition: background 0.3s;
        }
        .chaos-btn:hover { background-color: #dc2626; }
    </style>
</head>
<body>

    <!-- Sidebar -->
    <div class="sidebar">
        <div style="display: flex; align-items: center; gap: 12px; margin-bottom: 25px;">
            <div style="width: 32px; height: 32px; background: #3b82f6; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 14px;">SNS</div>
            <div style="font-weight: 700; font-size: 18px;">Admin Console</div>
        </div>

        <div class="sidebar-header">
            <span style="margin-right: 8px;">🏥</span> Service Health
        </div>
        <div id="service-list">
            <!-- Generated by JS -->
        </div>
    </div>

    <!-- Main Content -->
    <div class="main-content">
        <div class="metrics-header" id="metrics-title">Select a Service</div>
        <div id="metrics-container">
            <!-- Dynamic Content -->
        </div>
    </div>

    <script>
        const services = [
            { id: 'gateway', name: 'Order Gateway', url: 'http://localhost:3000/health', metricsUrl: 'http://localhost:3000/metrics' },
            { id: 'identity', name: 'Identity Provider', url: 'http://localhost:3001/health' },
            { id: 'stock', name: 'Stock Service', url: 'http://localhost:3002/health', metricsUrl: 'http://localhost:3002/metrics' },
            { id: 'kitchen', name: 'Kitchen Queue', url: 'http://localhost:3003/health', metricsUrl: 'http://localhost:3003/metrics' },
            { id: 'notification', name: 'Notification Hub', url: 'http://localhost:3004/health' }
        ];

        let selectedServiceId = 'gateway';
        
        // History Data for Charts
        const history = {
            stock: { latency: new Array(30).fill(0) },
            gateway: { 
                rejections: new Array(30).fill(0), 
                forwarded: new Array(30).fill(0),
                lastRejectionsTotal: 0,
                lastForwardedTotal: 0
            },
            kitchen: { cookingTime: new Array(30).fill(0) }
        };

        // Initialize Sidebar
        const serviceList = document.getElementById('service-list');
        services.forEach(s => {
            const div = document.createElement('div');
            div.className = `service-item ${s.id === selectedServiceId ? 'active' : ''}`;
            div.id = `item-${s.id}`;
            div.onclick = () => selectService(s.id);
            div.innerHTML = `
                <span class="service-name">${s.name}</span>
                <div class="status-dot" id="status-${s.id}"></div>
            `;
            serviceList.appendChild(div);
        });

        function selectService(id) {
            selectedServiceId = id;
            document.querySelectorAll('.service-item').forEach(el => el.classList.remove('active'));
            document.getElementById(`item-${id}`).classList.add('active');
            renderMetricsUI();
            updateMetrics(); // Fetch immediately
        }

        async function checkHealth() {
            for (const service of services) {
                const statusBadge = document.getElementById(`status-${service.id}`);
                try {
                    const response = await fetch(service.url);
                    if (response.ok) {
                        statusBadge.className = 'status-dot status-up';
                    } else {
                        throw new Error('503');
                    }
                } catch (error) {
                    statusBadge.className = 'status-dot status-down';
                }
            }
        }

        function renderMetricsUI() {
            const container = document.getElementById('metrics-container');
            const title = document.getElementById('metrics-title');
            const service = services.find(s => s.id === selectedServiceId);
            title.innerText = service.name + " Metrics";
            container.innerHTML = '';

            if (selectedServiceId === 'gateway') {
                container.innerHTML = `
                    <div class="metrics-grid">
                        <div class="metric-box"><div class="metric-value" id="gw-orders">--</div><div class="metric-label">Total Orders</div></div>
                        <div class="metric-box"><div class="metric-value" id="gw-latency">--</div><div class="metric-label">Avg Latency</div></div>
                        <div class="metric-box"><div class="metric-value" id="gw-redis">--</div><div class="metric-label">Redis Latency</div></div>
                        <div class="metric-box"><div class="metric-value" id="gw-failures">--</div><div class="metric-label">Failures</div></div>
                    </div>
                    <canvas id="gateway-chart" width="600" height="250"></canvas>
                    <div style="display:flex; justify-content:center; gap:20px; margin-top:10px; font-size:12px;">
                        <span style="color:#ef4444">● Cache Rejections</span>
                        <span style="color:#3b82f6">● Forwarded to Stock</span>
                    </div>
                    <button class="chaos-btn" onclick="triggerChaos('gateway')">☠️ KILL GATEWAY</button>
                `;
            } else if (selectedServiceId === 'stock') {
                container.innerHTML = `
                    <div class="metrics-grid">
                        <div class="metric-box"><div class="metric-value" id="st-orders">--</div><div class="metric-label">Total Orders</div></div>
                        <div class="metric-box"><div class="metric-value" id="st-latency">--</div><div class="metric-label">Avg Latency</div></div>
                        <div class="metric-box"><div class="metric-value" id="st-failures">--</div><div class="metric-label">Failures</div></div>
                    </div>
                    <canvas id="stock-chart" width="600" height="250"></canvas>
                    <div style="text-align:center; margin-top:10px; font-size:12px; color:#10b981">● Processing Latency (ms)</div>
                `;
            } else if (selectedServiceId === 'kitchen') {
                container.innerHTML = `
                    <div class="metrics-grid">
                        <div class="metric-box"><div class="metric-value" id="kc-orders">--</div><div class="metric-label">Total Orders</div></div>
                        <div class="metric-box"><div class="metric-value" id="kc-status">--</div><div class="metric-label">Chef Status</div></div>
                        <div class="metric-box"><div class="metric-value" id="kc-avg">--</div><div class="metric-label">Avg Cook Time</div></div>
                        <div class="metric-box"><div class="metric-value" id="kc-burned" style="color:#ef4444">--</div><div class="metric-label">Burned Meals 🔥</div></div>
                    </div>
                    <canvas id="kitchen-chart" width="600" height="250"></canvas>
                    <div style="text-align:center; margin-top:10px; font-size:12px; color:#f59e0b">● Cooking Duration (ms)</div>
                `;
            } else {
                container.innerHTML = `
                    <div class="metrics-grid">
                        <div class="metric-box"><div class="metric-value">--</div><div class="metric-label">Metric 1</div></div>
                        <div class="metric-box"><div class="metric-value">--</div><div class="metric-label">Metric 2</div></div>
                        <div class="metric-box"><div class="metric-value">--</div><div class="metric-label">Metric 3</div></div>
                    </div>
                    <div style="text-align:center; color:#64748b; padding: 50px;">Metrics integration pending for this service.</div>
                `;
            }
        }

        async function updateMetrics() {
            if (selectedServiceId === 'stock') {
                try {
                    const res = await fetch('http://localhost:3002/metrics');
                    if (res.ok) {
                        const data = await res.json();
                        document.getElementById('st-orders').innerText = data.total_orders;
                        document.getElementById('st-latency').innerText = data.average_latency_ms + 'ms';
                        document.getElementById('st-failures').innerText = data.failures;
                        
                        history.stock.latency.push(data.average_latency_ms || 0);
                        if (history.stock.latency.length > 30) history.stock.latency.shift();
                        drawStockChart();
                    }
                } catch (e) {}
            } 
            else if (selectedServiceId === 'gateway') {
                try {
                    const res = await fetch('http://localhost:3000/metrics');
                    if (res.ok) {
                        const data = await res.json();
                        document.getElementById('gw-orders').innerText = data.total_orders;
                        document.getElementById('gw-latency').innerText = data.average_latency_ms + 'ms';
                        document.getElementById('gw-redis').innerText = (data.average_redis_latency_ms || 0) + 'ms';
                        document.getElementById('gw-failures').innerText = data.failures;

                        // Calculate Delta (Rate of change)
                        const rejDelta = Math.max(0, data.cache_rejections - history.gateway.lastRejectionsTotal);
                        const fwdDelta = Math.max(0, data.forwarded_to_stock - history.gateway.lastForwardedTotal);
                        
                        history.gateway.lastRejectionsTotal = data.cache_rejections;
                        history.gateway.lastForwardedTotal = data.forwarded_to_stock;

                        history.gateway.rejections.push(rejDelta);
                        history.gateway.forwarded.push(fwdDelta);
                        
                        if (history.gateway.rejections.length > 30) history.gateway.rejections.shift();
                        if (history.gateway.forwarded.length > 30) history.gateway.forwarded.shift();
                        
                        drawGatewayChart();
                    }
                } catch (e) {}
            }
            else if (selectedServiceId === 'kitchen') {
                try {
                    const res = await fetch('http://localhost:3003/metrics');
                    if (res.ok) {
                        const data = await res.json();
                        document.getElementById('kc-orders').innerText = data.total_orders;
                        document.getElementById('kc-status').innerText = data.active_orders > 0 ? "👨‍🍳 COOKING" : "💤 IDLE";
                        document.getElementById('kc-avg').innerText = (data.average_cooking_time_ms || 0) + 'ms';
                        document.getElementById('kc-burned').innerText = data.burned_meals;

                        history.kitchen.cookingTime.push(data.average_cooking_time_ms || 0);
                        if (history.kitchen.cookingTime.length > 30) history.kitchen.cookingTime.shift();
                        drawKitchenChart();
                    }
                } catch (e) {}
            }
        }

        function drawStockChart() {
            const canvas = document.getElementById('stock-chart');
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            const w = canvas.width;
            const h = canvas.height;
            const data = history.stock.latency;

            ctx.clearRect(0, 0, w, h);
            ctx.strokeStyle = '#10b981';
            ctx.lineWidth = 2;
            ctx.beginPath();
            const maxVal = Math.max(...data, 10) * 1.2; 

            data.forEach((val, i) => {
                const x = (i / (data.length - 1)) * w;
                const y = h - ((val / maxVal) * h);
                if (i === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            });
            ctx.stroke();
        }

        function drawGatewayChart() {
            const canvas = document.getElementById('gateway-chart');
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            const w = canvas.width;
            const h = canvas.height;
            
            const rejData = history.gateway.rejections;
            const fwdData = history.gateway.forwarded;

            ctx.clearRect(0, 0, w, h);
            
            // Auto-scale
            const maxVal = Math.max(...rejData, ...fwdData, 5) * 1.2;

            // Draw Rejections (Red)
            ctx.strokeStyle = '#ef4444';
            ctx.lineWidth = 2;
            ctx.beginPath();
            rejData.forEach((val, i) => {
                const x = (i / (rejData.length - 1)) * w;
                const y = h - ((val / maxVal) * h);
                if (i === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            });
            ctx.stroke();

            // Draw Forwarded (Blue)
            ctx.strokeStyle = '#3b82f6';
            ctx.beginPath();
            fwdData.forEach((val, i) => {
                const x = (i / (fwdData.length - 1)) * w;
                const y = h - ((val / maxVal) * h);
                if (i === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            });
            ctx.stroke();
        }

        function drawKitchenChart() {
            const canvas = document.getElementById('kitchen-chart');
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            const w = canvas.width;
            const h = canvas.height;
            const data = history.kitchen.cookingTime;

            ctx.clearRect(0, 0, w, h);
            ctx.strokeStyle = '#f59e0b'; // Orange for cooking
            ctx.lineWidth = 2;
            ctx.beginPath();
            const maxVal = Math.max(...data, 1000) * 1.2; 

            data.forEach((val, i) => {
                const x = (i / (data.length - 1)) * w;
                const y = h - ((val / maxVal) * h);
                if (i === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            });
            ctx.stroke();
        }

        async function triggerChaos(serviceName) {
            if (serviceName === 'gateway') {
                const btn = document.querySelector('.chaos-btn');
                if(btn) btn.innerText = "💥 CRASHING...";
                try {
                    await fetch('http://localhost:3000/api/kill', { method: 'POST' });
                } catch (e) {
                    console.log("Service terminated.");
                }
            }
        }

        // Poll health every 3 seconds
        setInterval(checkHealth, 3000);
        setInterval(updateMetrics, 3000);
        checkHealth();
        renderMetricsUI(); // Initial render
    </script>

</body>
</html>
